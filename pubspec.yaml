name: enterprise_template
description: "Enterprise-ready Flutter template with Riverpod, GoRouter, mock auth, paywall, and AI scaffolding."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/
    - assets/config/

  # Placeholder font registration.
  # Replace the file below with a real TTF before using the family in UI.
  # fonts:
  #   - family: OrbitronPlaceholder
  #     fonts:
  #       - asset: assets/fonts/orbitron_placeholder.ttf
